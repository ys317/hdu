      - generic [ref=e124]:
        - generic [ref=e125]: 基础设施提质工程 | 焕然一新的杭电图书馆闪亮登场了
        - generic [ref=e126]: 作者： 来源：图书馆 时间：2025-09-19
        - generic [ref=e128]:
          - paragraph [ref=e129]:
            - strong [ref=e130]: 你有没有被学校焕然一“新”的图书馆惊艳到？
          - paragraph [ref=e131]:
            - img [ref=e132]
          - paragraph [ref=e133]: 大楼上的“图书馆”三个铜字经过清洗后显得更加熠熠生辉！在二楼东自修室全新设置了敞亮的照明、舒适的座椅和阅读桌。在二楼北区域建成了可容纳50人左右的学术活动室。三楼打造了休闲小憩舒适区。四楼按照轻中式风格进行重点打造。六楼重点打造了10间大小不一的讨论间。每个讨论间均配备有隔音和独立空调系统。
          - paragraph [ref=e134]:
            - img [ref=e135]
          - paragraph [ref=e136]:
            - img [ref=e137]
          - paragraph [ref=e138]:
            - img [ref=e139]
          - paragraph [ref=e140]: 我们还给每个功能区都取了名字，如二楼东学习空间取名为“格物E堂”，四楼学习空间取名为“宋韵云图”，六楼学习空间取名为“杭韵数阁”。
          - paragraph [ref=e141]:
            - strong [ref=e142]: 你心动了吗？
          - paragraph [ref=e143]: 据了解，本次升级改造是浙江省高校基础设施提质工程的重要组成部分。项目以“环境美化、布局优化、功能细化、服务强化”为核心理念，进一步优化读者学习环境，增强空间利用成效，精心致力于为师生提供更加舒适、暖心、现代化的阅读体验，着力打造校园文化新地标。升级改造后的出入口更加便利，咨询服务台的服务更加暖心。二楼的学习空间焕然一新，四楼和六楼的空间布局更加合理。新更换的阅览桌和座椅，宽大舒适，为师生们提供了更加惬意的阅读体验。每个阅览桌上均配备了电源插座、独立照明和USB接口，光线明亮而柔和。改造一新的玻璃幕墙更加通透，使图书馆二楼大厅更显大气和庄严。今后在这里会不定期举办各类专题展览。每个楼层的过道、电梯间都进行了粉刷。十二楼部分无法正常使用的空调也已更新完毕。我们还在各楼层的学习空间新增设了10台静音舱，方便读者接打电话。每个舱体都配备照明设备、电源插座、USB端口，并设有单独通风系统。
          - paragraph [ref=e144]: 在改造工程正式启动之前和改造过程中，校党委书记吴卿、校长陈积明非常关心项目的设计理念和改造进程，多次在图书馆召开现场会，研究商定有关细节。
          - paragraph [ref=e145]:
            - img [ref=e146]
          - paragraph [ref=e147]: 图书馆将以本次环境改造提档升级为契机，致力于为师生提供更加优质的服务，唱响人工智能时代的“书海歌”，为杭电的高质量人才培养做出图书馆人的贡献。
