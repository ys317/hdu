      - generic [ref=e71]:
        - generic [ref=e72]: 重游老校区，遇见最美丽的杭电
        - generic [ref=e73]: 作者：宋建跃/摄 来源：新闻网 时间：2014-05-30
        - generic [ref=e77]:
          - paragraph [ref=e78]
          - paragraph [ref=e79]
          - paragraph [ref=e80]: 每所大学都有自己的老校区，供前人追忆，予后人回味。杭电也有一个老校区，它坐落于城西的文教区内，与学校的办学历史一样长久；它临河傍水，茂林修篁，绿树成荫，芳草幽径，在杭电历届学子心目中享有“西湖十一景”的美誉；在它的现有建筑中，行政楼、东西教学楼和“工”字楼，被杭州市列入并公布为第二批历史建筑保护名录。它就是古色古香的文一校区。参天的大树，古朴的红楼，还有那林间的凉亭，文一校区就像一位迟暮的老人，脸上写满了岁月的痕迹，但那是时光雕琢上去的美丽印记。请跟着我们的镜头，重游一番老校区，穿过那些静谧的时光，再次感受杭电的不老魅力。
